<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profiledisplay.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <img id="logo" src="/pictures/lockedResized.png" alt="LockedIn Logo">


        <div class="top-buttons">
            <div>
                <button class="button" type="button" id="mygroups">My Groups</button>
            </div>

            <div class="top-right">
                
                <a style="position:relative" href="profiledisplay.html" id="profile-email-top">-</a>
                <button id="profile" aria-label="Profile"></button>

            </div>
        </div>
        
    </header>
    <main>
        <div class="container">
            <header1><h1>Profile View</h1></header1>
            
            <hr>

            <!-- <h2>Two Equal Columns</h2> -->
        
            <div class="row">
              <div class="column">
                <!-- <h2>Column 1</h2> -->
<h3>Name: <span id="profile-name">-</span></h3>
<h3>Email: <span id="profile-email">-</span></h3>
<h3>Major: <span id="profile-major">-</span></h3>
<h3>Year: <span id="profile-year">-</span></h3>
<h3>Classes: <span id="profile-classes">-</span></h3>
<h3>Study Style: <span id="profile-style">-</span></h3>
<h3>Saved Appointments:</h3>
<ul id="appointments-list">
  <li>No appointments yet.</li>
</ul>
<h3>Selected Groups:</h3>
<ul id="selected-groups-list">
  <li>No selected groups yet.</li>
</ul>
                <br>
                <br>
                <br>
                <br>
              </div>
              <div class="column">
                <!-- <h2>Column 2</h2> -->
                <img id="profilepic" src="https://www.freeiconspng.com/thumbs/profile-icon-png/profile-icon-9.png" alt="Profile Picture">
                <div class="container1">
                    <button type="button" class="butt" id="logout">Logout</button>
            
                  
            
                  </div>
                

              </div>
            </div>
      
            
      
            
      
      
      
            <!-- <div class="clearfix">
              
            </div> -->
          </div>
        
    </main> 

    

       
        
    <script src="profiledisplay.js"></script>
</body>
</html>
